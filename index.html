<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webinoid | AI Strategy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; }
        /* The "Bento" Tile Style */
        .bento-tile { background: #111; border: 1px solid #222; border-radius: 1.5rem; padding: 2rem; }
    </style>
</head>
<body class="p-4 md:p-12">

    <header class="mb-8">
        <h1 class="text-xs uppercase tracking-[0.3em] text-gray-500 font-bold mb-2">Webinoid Agency</h1>
        <p class="text-4xl font-bold leading-tight">Architecting the <span class="text-indigo-500">future of search.</span></p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <div class="bento-tile md:col-span-2 flex flex-col justify-end min-h-[300px] bg-gradient-to-br from-indigo-900/20 to-transparent">
            <h2 class="text-2xl font-bold mb-2">SGE Strategy</h2>
            <p class="text-gray-400">Optimizing your brand to be the primary citation in AI-generated search results.</p>
        </div>

        <div class="bento-tile flex flex-col justify-center border-indigo-500/30">
            <h2 class="text-xl font-bold">100%</h2>
            <p class="text-sm text-gray-500 uppercase tracking-widest">AI Native</p>
        </div>

        <div class="bento-tile">
            <h3 class="font-bold mb-2 uppercase text-xs text-indigo-400 tracking-widest">Architecture</h3>
            <p class="text-sm text-gray-400">Scalable tech stacks built for high-velocity AI deployment.</p>
        </div>

        <div class="bento-tile md:col-span-2">
            <h2 class="text-xl font-bold mb-4">Let's Build.</h2>
            <form action="https://formspree.io/f/xvzvpenb" method="POST" class="flex flex-col gap-3">
                <input type="email" name="email" placeholder="Email Address" class="bg-black border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
                <button class="bg-white text-black font-bold p-3 rounded-xl text-sm uppercase">Submit Brief</button>
            </form>
        </div>

    </div>

    <footer class="mt-8 pt-8 border-t border-white/5 flex flex-col gap-2">
        <p class="text-xs text-gray-600">gorlevivekanand@webinoid.in</p>
        <p class="text-xs text-gray-600">+91 8143529847</p>
    </footer>

</body>
</html>
